version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: unisphere-db
    restart: always
    environment:
      POSTGRES_USER: unisphere_user
      POSTGRES_PASSWORD: unisphere_password
      POSTGRES_DB: unisphere_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: unisphere-cache
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: unisphere-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://unisphere_user:unisphere_password@postgres:5432/unisphere_hub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secure_secret_key_12345
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: unisphere-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
