services:
  # 1. UniSphere Backend API Web Service
  - type: web
    name: unisphere-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: unisphere-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: unisphere-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2. UniSphere Frontend Static Web Client
  - type: web
    name: unisphere-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# 3. Redis Cache Instance
databases:
  - name: unisphere-db
    plan: free
    postgresVersion: 15

# 4. Redis Cache Node
redis:
  - name: unisphere-cache
    plan: free
    ipAllowList: [] # internal connections only
